name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  docs-check:
    name: Docs Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify README.md exists
        run: |
          test -f README.md && echo "README.md found ($(wc -l < README.md) lines)" || (echo "ERROR: README.md not found" && exit 1)

      - name: List study note directories
        run: |
          echo "Study note directories:"
          find . -maxdepth 1 -type d ! -name ".*" | sort | tail -n +2

      - name: Check for accidental secret-like patterns
        run: |
          echo "Scanning for accidental secret patterns..."
          found=$(grep -rn --include="*.md" --include="*.json" --include="*.html" --include="*.js"             -E "^[A-Za-z_]+(api_key|secret|password|token|private_key)[A-Za-z_]*\s*=\s*.{{8,}}" .             --exclude-dir=".git" 2>/dev/null || true)
          if [ -n "$found" ]; then
            echo "WARNING: Review these lines for possible secrets:"
            echo "$found"
          else
            echo "No obvious secret-like patterns detected."
          fi
